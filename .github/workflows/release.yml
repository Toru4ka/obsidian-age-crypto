name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Validate release tag
        run: |
          node -e "const fs = require('fs'); const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8')); const tag = process.env.GITHUB_REF_NAME; if (manifest.version !== tag) { throw new Error('manifest.json version ' + manifest.version + ' does not match tag ' + tag); }"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            AGE Crypto ${{ github.ref_name }}

            Changes:
            - Build release assets from source with GitHub Actions.
            - Publish GitHub artifact attestations for release assets.

            Assets:
            - main.js
            - manifest.json
            - styles.css
          files: |
            main.js
            manifest.json
            styles.css
